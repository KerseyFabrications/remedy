name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config gcc \
            libcmark-gfm-dev libcmark-gfm-extensions-dev libncurses-dev

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          make -C build -j$(nproc)

      - name: Smoke test
        run: |
          # Binary runs and reports correct version
          ./build/remedy --version

          # Good markdown passes diagnosis
          ./build/remedy --diagnose test.md

          # Bad markdown fails diagnosis (exit 1)
          ! ./build/remedy --diagnose test-bad.md

          # Stdin pipe works
          echo "# Hello" | ./build/remedy --diagnose

      - name: Build .deb package
        run: ./packaging/build-deb.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: remedy-linux-${{ matrix.arch }}-deb
          path: packaging/*.deb

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake pkg-config cmark-gfm ncurses

      - name: Build
        run: |
          BREW_PREFIX="$(brew --prefix)"
          export PKG_CONFIG_PATH="${BREW_PREFIX}/opt/ncurses/lib/pkgconfig:${BREW_PREFIX}/opt/cmark-gfm/lib/pkgconfig"
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          make -C build -j$(sysctl -n hw.logicalcpu)

      - name: Smoke test
        run: |
          ./build/remedy --version
          ./build/remedy --diagnose test.md
          ! ./build/remedy --diagnose test-bad.md
          echo "# Hello" | ./build/remedy --diagnose

      - name: Package binary
        run: |
          strip build/remedy
          tar -czf packaging/remedy-macos-$(uname -m).tar.gz -C build remedy

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: remedy-macos
          path: packaging/remedy-macos-*.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/remedy-linux-amd64-deb/*.deb
            artifacts/remedy-linux-arm64-deb/*.deb
            artifacts/remedy-macos/*.tar.gz
          generate_release_notes: true

  update-homebrew:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          TARBALL_URL="https://github.com/KerseyFabrications/remedy/archive/refs/tags/v${VERSION}.tar.gz"

          curl -sL "$TARBALL_URL" -o /tmp/remedy.tar.gz
          SHA256=$(sha256sum /tmp/remedy.tar.gz | awk '{print $1}')

          FORMULA=$(cat <<RUBY
          class Remedy < Formula
            desc "Full-featured less-like markdown pager for modern terminals"
            homepage "https://github.com/KerseyFabrications/remedy"
            url "https://github.com/KerseyFabrications/remedy/archive/refs/tags/v${VERSION}.tar.gz"
            sha256 "${SHA256}"
            license "GPL-3.0-or-later"

            head "https://github.com/KerseyFabrications/remedy.git", branch: "master"

            depends_on "cmake" => :build
            depends_on "pkg-config" => :build
            depends_on "cmark-gfm"
            depends_on "ncurses"

            def install
              system "cmake", "-S", ".", "-B", "build", *std_cmake_args
              system "make", "-C", "build", "-j#{ENV.make_jobs}"
              system "make", "-C", "build", "install"
            end

            test do
              assert_match "remedy #{version}", shell_output("#{bin}/remedy --version")
              pipe_output("#{bin}/remedy --diagnose", "# Hello World", 0)
            end
          end
          RUBY
          )

          # Get current file SHA (required by GitHub API for updates)
          FILE_SHA=$(curl -s \
            -H "Authorization: token ${TAP_TOKEN}" \
            "https://api.github.com/repos/KerseyFabrications/homebrew-tap/contents/Formula/remedy.rb" \
            | jq -r '.sha')

          # Update formula via GitHub API
          CONTENT=$(echo "$FORMULA" | base64 -w 0)
          curl -s -X PUT \
            -H "Authorization: token ${TAP_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/KerseyFabrications/homebrew-tap/contents/Formula/remedy.rb" \
            -d "{
              \"message\": \"Update remedy to ${VERSION}\",
              \"content\": \"${CONTENT}\",
              \"sha\": \"${FILE_SHA}\"
            }"
